<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sihirdar Görev Merkezi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Beaufort+for+LOL:wght@700&family=Spiegel:wght@400;700&display=swap');

        :root {
            --gold: #c89b3c;
            --blue: #0ac8b9;
            --dark: #010a13;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Spiegel', sans-serif;
            color: #f0e6d2;
            
            /* --- ARKA PLAN AYARI --- */
            background-color: var(--dark); /* Resim yüklenmezse lacivert kalır */
            background-image: url(wp9493224-league-of-legends-darius-wallpapers.jpg); /* BURAYA RESİM LİNKİNİ YAPIŞTIR CONI */
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            /* ----------------------- */
        }

        /* Ana Panel Konteynırı */
        .client-wrapper {
            display: flex;
            width: 1050px;
            height: 620px;
            background: rgba(1, 10, 19, 0.9); /* Arka planın görünmesi için hafif şeffaf */
            border: 2px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); /* Cam efekti için arkayı bulanıklaştırır */
        }

        /* SOL TARAF: GİRİŞ */
        .input-section {
            flex: 1;
            padding: 40px;
            border-right: 1px solid var(--gold);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-family: 'Beaufort for LOL'; color: var(--gold); text-transform: uppercase; margin: 0; }

        .field-group { display: flex; flex-direction: column; gap: 8px; }
        label { color: var(--blue); font-size: 11px; font-weight: bold; letter-spacing: 1px; }

        input {
            background: rgba(30, 35, 40, 0.9);
            border: 1px solid var(--gold);
            padding: 14px;
            color: white;
            outline: none;
            font-size: 16px;
        }

        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(10, 200, 185, 0.3); }

        .btn-confirm {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 18px;
            font-family: 'Beaufort for LOL';
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-confirm:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* SAĞ TARAF: LİSTE */
        .list-section {
            flex: 1.3;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        ul { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }

        li {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(200, 155, 60, 0.2);
            margin-bottom: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } }

        .champ-icon { width: 50px; height: 50px; border: 1px solid var(--gold); }
        .task-info { flex-grow: 1; }
        .champ-name { color: var(--blue); font-size: 11px; font-weight: bold; }

        .delete-btn {
            background: none;
            border: 1px solid #d0383e;
            color: #d0383e;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="client-wrapper">
    <div class="input-section">
        <h2>Görev Seçimi</h2>
        
        <div class="field-group">
            <label>ŞAMPİYON SEÇ</label>
            <input list="champList" id="champInput" placeholder="Şampiyon ismi...">
            <datalist id="champList">
                </datalist>
        </div>

        <div class="field-group">
            <label>TALİMAT</label>
            <input type="text" id="taskInput" placeholder="Ne yapacaksın?">
        </div>

        <button class="btn-confirm" onclick="elemanEkle()">ONAYLA VE GÖNDER</button>
    </div>

    <div class="list-section">
        <h2>GÖREV GÜNLÜĞÜ</h2>
        <ul id="taskUl"></ul>
    </div>
</div>

<script>
    const champions = ["Aatrox", "Ahri", "Akali", "Akshan", "Alistar", "Amumu", "Anivia", "Annie", "Aphelios", "Ashe", "Aurelion Sol", "Azir", "Bard", "Bel'Veth", "Blitzcrank", "Brand", "Braum", "Briar", "Caitlyn", "Camille", "Cassiopeia", "Cho'Gath", "Corki", "Darius", "Diana", "Dr. Mundo", "Draven", "Ekko", "Elise", "Evelynn", "Ezreal", "Fiddlesticks", "Fiora", "Fizz", "Galio", "Gangplank", "Garen", "Gnar", "Gragas", "Graves", "Gwen", "Hecarim", "Heimerdinger", "Hwei", "Illaoi", "Irelia", "Ivern", "Janna", "Jarvan IV", "Jax", "Jayce", "Jhin", "Jinx", "K'Sante", "Kai'Sa", "Kalista", "Karma", "Karthus", "Kassadin", "Katarina", "Kayle", "Kayn", "Kennen", "Kha'Zix", "Kindred", "Kled", "Kog'Maw", "LeBlanc", "Lee Sin", "Leona", "Lillia", "Lissandra", "Lucian", "Lulu", "Lux", "Malphite", "Malzahar", "Maokai", "Master Yi", "Milio", "Miss Fortune", "Mordekaiser", "Morgana", "Naafiri", "Nami", "Nasus", "Nautilus", "Neeko", "Nidalee", "Nilah", "Nocturne", "Nunu & Willump", "Olaf", "Orianna", "Ornn", "Pantheon", "Poppy", "Pyke", "Qiyana", "Quinn", "Rakan", "Rammus", "Rek'Sai", "Rell", "Renata Glasc", "Renekton", "Rengar", "Riven", "Rumble", "Ryze", "Samira", "Sejuani", "Senna", "Seraphine", "Sett", "Shaco", "Shen", "Shyvana", "Singed", "Sion", "Sivir", "Skarner", "Sona", "Soraka", "Swain", "Sylas", "Syndra", "Tahm Kench", "Taliyah", "Talon", "Taric", "Teemo", "Thresh", "Tristana", "Trundle", "Tryndamere", "Twisted Fate", "Twitch", "Udyr", "Urgot", "Varus", "Vayne", "Veigar", "Vel'Koz", "Vex", "Vi", "Viego", "Viktor", "Vladimir", "Volibear", "Warwick", "Wukong", "Xayah", "Xerath", "Xin Zhao", "Yasuo", "Yone", "Yorick", "Yuumi", "Zac", "Zed", "Zeri", "Ziggs", "Zilean", "Zoe", "Zyra"];

    const datalist = document.getElementById("champList");
    const champInput = document.getElementById("champInput");
    const taskInput = document.getElementById("taskInput");
    const taskUl = document.getElementById("taskUl");

    // Datalist doldurma
    champions.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        datalist.appendChild(opt);
    });

    // Enter Desteği
    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") elemanEkle();
    });

    function elemanEkle() {
        const champ = champInput.value.trim();
        const task = taskInput.value.trim();
        if (!task) return;

        // İsim formatlama ve resim çekme
        const formatted = champ.charAt(0).toUpperCase() + champ.slice(1).toLowerCase().replace(/\s/g, '').replace("'", "");
        const imgUrl = `https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${formatted}.png`;

        const li = document.createElement("li");
        li.innerHTML = `
            <img src="${imgUrl}" class="champ-icon" onerror="this.src='https://via.placeholder.com/50/091428/c89b3c?text=LoL'">
            <div class="task-info">
                <div class="champ-name">${champ.toUpperCase()}</div>
                <div>${task}</div>
            </div>
            <button class="delete-btn" onclick="this.parentElement.remove()">SİL</button>
        `;

        taskUl.prepend(li);
        taskInput.value = "";
        champInput.value = "";
        champInput.focus();
    }
</script>

</body>
</html>
