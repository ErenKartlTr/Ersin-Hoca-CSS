<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ErenCrypto | Fiyat Takipçisi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-chart-line"></i> Kripto Takip</h1>

        </header>

        <main id="crypto-list">

        <button onclick="fiyatlariGetir()" id="refresh-btn">
            <i class="fa-solid fa-arrows-rotate"></i> Fiyatları Güncelle
        </button>
    </div>

    <script src="script.js"></script>

</html>
